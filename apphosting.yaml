# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # SSE streaming import can process arbitrarily large ICFES booklets.
  # Each 10 000-char chunk takes ~5 s of AI processing; 3600 s (1 hour)
  # is the maximum Cloud Run allows and covers booklets of any size.
  timeoutSeconds: 3600
