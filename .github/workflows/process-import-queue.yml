name: Process Import Queue

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

# Prevent parallel runs: if a run is already in progress, let it finish
# (cancel-in-progress: false) and block additional runs from starting.
# This avoids hammering Gemini quota with concurrent requests.
concurrency:
  group: process-import-queue
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions: {}  # Restrict GITHUB_TOKEN to minimum required permissions
    steps:
      - name: Process one pending import chunk
        run: |
          curl -fv -X POST "${{ secrets.VERCEL_APP_URL }}/api/process-chunk" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55
